<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Document Intelligence</title>

<style>

body{
margin:0;
font-family:Inter,Segoe UI,Arial;
background:#f4f6f9;
}

header{
background:white;
padding:16px 28px;
font-size:20px;
font-weight:600;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.layout{
display:grid;
grid-template-columns:60% 40%;
height:calc(100vh - 60px);
}

.viewer{
background:#e9edf3;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.placeholder{
color:#666;
font-size:18px;
text-align:center;
}

.analysis{
display:flex;
flex-direction:column;
overflow:hidden;
}

.uploadBar{
background:white;
padding:12px;
border-bottom:1px solid #e5e7eb;
}

button{
padding:6px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.progress{
height:4px;
background:#ddd;
margin-top:8px;
border-radius:4px;
overflow:hidden;
}

.progressInner{
height:100%;
width:0%;
background:#2563eb;
transition:.3s;
}

.processing{
font-size:14px;
color:#444;
margin-top:8px;
}

.tabs{
display:flex;
background:white;
border-bottom:1px solid #e5e7eb;
}

.tab{
padding:10px 16px;
cursor:pointer;
}

.tab.active{
border-bottom:3px solid #2563eb;
font-weight:600;
}

.panel{
flex:1;
overflow:auto;
padding:20px;
}

.card{
background:white;
padding:14px;
border-radius:8px;
margin-bottom:12px;
box-shadow:0 1px 5px rgba(0,0,0,.08);
}

.fact{
border-left:4px solid #22c55e;
padding:10px;
margin-bottom:10px;
cursor:pointer;
}

.fact:hover{
background:#f5f5f5;
}

.entity{
display:inline-block;
background:#e0e7ff;
padding:4px 7px;
margin:3px;
border-radius:5px;
font-size:12px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:6px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:8px;
width:500px;
}

.spinner{
border:4px solid #ddd;
border-top:4px solid #2563eb;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

/* RAW EXTRACTION */

.rawPage{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 1px 6px rgba(0,0,0,.08);
cursor:pointer;
}

.rawHeader{
font-weight:600;
margin-bottom:10px;
color:#2563eb;
}

.rawText{
white-space:pre-wrap;
font-family:monospace;
font-size:13px;
line-height:1.5;
background:#f7f7f7;
padding:12px;
border-radius:6px;
max-height:350px;
overflow:auto;
}

</style>

</head>

<body>

<header>Document Intelligence</header>

<div class="layout">

<div class="viewer">

<div id="placeholder" class="placeholder">

<div class="spinner"></div>

<div id="statusText">Upload a document to begin</div>

</div>

<iframe id="pdfViewer" style="display:none"></iframe>

</div>

<div class="analysis">

<div class="uploadBar">

<input type="file" id="fileInput">

<button onclick="upload()">Analyze</button>

<div class="progress">
<div id="progress" class="progressInner"></div>
</div>

<div id="processing" class="processing"></div>

</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('summary',this)">Summary</div>
<div class="tab" onclick="switchTab('facts',this)">Facts</div>
<div class="tab" onclick="switchTab('entities',this)">Entities</div>
<div class="tab" onclick="switchTab('tables',this)">Tables</div>
<div class="tab" onclick="switchTab('raw',this)">Raw Extraction</div>

</div>

<div class="panel">

<div id="summary"></div>

<div id="facts" style="display:none">

<input class="search" placeholder="Search facts..." oninput="searchFacts(this.value)">
<div id="factsList"></div>

</div>

<div id="entities" style="display:none"></div>

<div id="tables" style="display:none"></div>

<div id="raw" style="display:none"></div>

</div>

</div>

</div>

<div class="modal" id="factModal">

<div class="modalBox">

<h3 id="modalFact"></h3>

<b>Evidence</b>
<p id="modalEvidence"></p>

<b>Page</b>
<p id="modalPage"></p>

<button onclick="closeModal()">Close</button>

</div>

</div>

<script>

let resultsData=null

function setProgress(v){
document.getElementById("progress").style.width=v+"%"
}

function setStatus(text){
document.getElementById("statusText").innerText=text
}

function switchTab(id,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

document.querySelectorAll(".panel > div").forEach(p=>p.style.display="none")

document.getElementById(id).style.display="block"

}

async function upload(){

let file=document.getElementById("fileInput").files[0]

if(!file) return alert("Choose file")

setStatus("Uploading...")

let form=new FormData()

form.append("file",file)

let res=await fetch("/upload",{method:"POST",body:form})

let data=await res.json()

startStream(data.job_id,file.name)

}

function startStream(job,file){

let source=new EventSource("/stream/"+job)

setStatus("Processing document...")

source.onmessage=e=>{

let d=JSON.parse(e.data)

if(d.type==="progress"){

setProgress(d.progress)
document.getElementById("processing").innerText=d.status

}

if(d.type==="complete"){

renderResults(d.result)

loadViewer(file)

setStatus("Analysis complete")
setProgress(100)

source.close()

}

if(d.type==="error"){

setStatus("Error: "+d.error)
source.close()

}

}

}

function loadViewer(file){

document.getElementById("placeholder").style.display="none"

let viewer=document.getElementById("pdfViewer")

viewer.style.display="block"

viewer.src="/uploads/"+file

}

function renderResults(data){

resultsData=data

document.getElementById("summary").innerHTML=
"<div class='card'>"+(data.summary||"No summary")+"</div>"

renderFacts(data.verified_facts||[])
renderEntities(data.entities||[])
renderTables(data._raw_tables||[])
renderRaw(data._raw_pages||[])

}

function renderFacts(facts){

let div=document.getElementById("factsList")

div.innerHTML=""

facts.forEach(f=>{

let el=document.createElement("div")
el.className="fact"

el.innerHTML=
"<b>"+f.fact+"</b><br>Confidence: "+Math.round((f.confidence||0)*100)+"%"

el.onclick=()=>showFact(f)

div.appendChild(el)

})

}

function renderEntities(ents){

let div=document.getElementById("entities")

div.innerHTML=""

ents.forEach(e=>{

let el=document.createElement("span")
el.className="entity"
el.innerText=e.name

div.appendChild(el)

})

}

function renderTables(tables){

let div=document.getElementById("tables")

div.innerHTML=""

tables.forEach(t=>{

let table=document.createElement("table")

t.rows.forEach((r,i)=>{

let tr=document.createElement("tr")

r.forEach(c=>{

let cell=document.createElement(i?"td":"th")
cell.innerText=c

tr.appendChild(cell)

})

table.appendChild(tr)

})

let card=document.createElement("div")
card.className="card"

card.appendChild(table)

div.appendChild(card)

})

}

function renderRaw(pages){

let div=document.getElementById("raw")

div.innerHTML=""

pages.forEach(p=>{

let card=document.createElement("div")
card.className="rawPage"

let header=document.createElement("div")
header.className="rawHeader"
header.innerText="Page "+p.page

let text=document.createElement("div")
text.className="rawText"
text.innerText=p.text

card.appendChild(header)
card.appendChild(text)

card.onclick=()=>jumpToPage(p.page)

div.appendChild(card)

})

}

function showFact(f){

document.getElementById("factModal").style.display="flex"

document.getElementById("modalFact").innerText=f.fact
document.getElementById("modalEvidence").innerText=f.evidence_quote

let page=f.citations?.[0]?.page

document.getElementById("modalPage").innerText="Page "+page

if(page) jumpToPage(page)

}

function jumpToPage(page){

let viewer=document.getElementById("pdfViewer")

viewer.src=viewer.src.split("#")[0]+"#page="+page

}

function closeModal(){

document.getElementById("factModal").style.display="none"

}

function searchFacts(q){

if(!resultsData) return

q=q.toLowerCase()

let filtered=(resultsData.verified_facts||[]).filter(f=>f.fact.toLowerCase().includes(q))

renderFacts(filtered)

}

</script>

</body>
</html>
